<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXTUS Travel Assistant</title>
  
  <link rel="icon" href="images/bot-icon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    
    <div class="chat-header">
      <img src="images/bot-icon.png" alt="NEXTUS Travel Bot" class="bot-icon">
      <div class="header-text">
        <h2>NEXTUS Travel Assistant</h2>
        <p class="subtitle">Siap menemani perjalananmu ✈️</p>
      </div>
    </div>

    <div id="chat-box">
      <!-- Pesan awal dari bot -->
      <div class="message bot">
        Halo! 👋 Saya NEXTUS Travel Assistant. Mau liburan ke mana? Saya bisa bantu itinerary, rekomendasi kuliner, atau tips packing! 🎒
      </div>
    </div>

    <form id="chat-form">
      <input 
        type="text" 
        id="user-input" 
        placeholder="Tanya destinasi impianmu..." 
        autocomplete="off"
      >
      <button type="submit">Kirim</button>
    </form>

  </div>

  <!-- Script Logika Chat -->
  <script src="script.js"></script>

</body>
</html>
